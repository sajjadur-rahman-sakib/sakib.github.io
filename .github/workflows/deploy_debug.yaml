name: Deploy to Server (Debug Version)

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # First, test SSH connection
      - name: Test SSH Connection
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          debug: true
          script: |
            echo "SSH connection successful!"
            whoami
            pwd
            ls -la /home/ug2002041/ || echo "Cannot access /home/ug2002041/"

      # Create deployment package (simplified)
      - name: Create deployment package
        run: |
          # Create a simple test deployment
          mkdir -p deploy
          cp -r . deploy/ || echo "Copy failed"
          # Remove unnecessary files
          rm -rf deploy/.git deploy/.github deploy/deploy
          # Create tarball
          tar -czf website.tar.gz -C deploy . || echo "Tar creation failed"
          ls -la website.tar.gz

      # Test SCP file transfer
      - name: Test file copy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          debug: true
          source: "website.tar.gz"
          target: "/tmp/"

      # Test file extraction and setup
      - name: Test deployment setup
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          debug: true
          script: |
            echo "=== Testing deployment setup ==="
            
            # Check if file was uploaded
            ls -la /tmp/website.tar.gz || { echo "File not found in /tmp/"; exit 1; }
            
            # Create target directory
            mkdir -p /home/ug2002041/public_html/ || { echo "Cannot create public_html directory"; exit 1; }
            
            # Test extraction
            cd /tmp
            tar -tzf website.tar.gz | head -10 || { echo "Cannot read tar file"; exit 1; }
            
            # Extract to target
            tar -xzf website.tar.gz -C /home/ug2002041/public_html/ || { echo "Cannot extract files"; exit 1; }
            
            # Set permissions
            find /home/ug2002041/public_html/ -type f -exec chmod 644 {} \; || echo "Cannot set file permissions"
            find /home/ug2002041/public_html/ -type d -exec chmod 755 {} \; || echo "Cannot set directory permissions"
            
            # Cleanup
            rm -f /tmp/website.tar.gz || echo "Cannot remove temp file"
            
            echo "=== Deployment test completed ==="
            ls -la /home/ug2002041/public_html/ | head -10